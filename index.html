/* ─── COMPARATEUR ─── */
function Comparator({units,onClose}){
  const[a,setA]=useState(null);const[b,setB]=useState(null);const[tier,setTier]=useState(1);
  const[searchA,setSA]=useState("");const[searchB,setSB]=useState("");
  const gt=(u,ti)=>ti===1?u.tier1:ti===2?u.tier2:u.tier3;
  const pv=(v)=>parseFloat(String(v).split("/")[0])||0;
  const renderSel=(val,setVal,search,setSearch,side)=>(
    <div style={{flex:1,minWidth:200}}>
      <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher une unité..."
        style={{width:"100%",padding:"6px 10px",borderRadius:6,border:"1px solid #333",background:"#111",color:"#ddd",fontSize:12,outline:"none",marginBottom:6}}/>
      <div style={{maxHeight:180,overflowY:"auto",background:"#111",borderRadius:6,border:"1px solid #222"}}>
        {units.filter(u=>!search||u.name.toLowerCase().includes(search.toLowerCase())).map(u=>(
          <div key={u.name} onClick={()=>{setVal(u);setSearch("");}} style={{padding:"6px 10px",cursor:"pointer",fontSize:11,color:val?.name===u.name?"#facc15":"#aaa",background:val?.name===u.name?"#facc1511":"transparent",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:6}}
          onMouseEnter={e=>e.currentTarget.style.background="#1a1a1a"} onMouseLeave={e=>e.currentTarget.style.background=val?.name===u.name?"#facc1511":"transparent"}>
            <span>{u.icon}</span><span>{u.name}</span><span style={{fontSize:9,color:"#555",marginLeft:"auto"}}>{u.category}</span>
          </div>))}
      </div>
    </div>);
  const bar=(la,va,vb,max,col)=>{const pa=pv(va),pb=pv(vb);return(
    <div style={{marginBottom:6}}>
      <div style={{fontSize:10,color:"#888",textAlign:"center",marginBottom:2}}>{la}</div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <span style={{fontSize:11,color:pa>pb?"#4ade80":pa<pb?"#f87171":"#aaa",fontFamily:"'JetBrains Mono',monospace",width:50,textAlign:"right"}}>{va||"—"}</span>
        <div style={{flex:1,display:"flex",gap:2}}>
          <div style={{flex:1,height:6,background:"#222",borderRadius:3,overflow:"hidden",direction:"rtl"}}><div style={{height:"100%",width:`${Math.min(pa/max*100,100)}%`,background:pa>=pb?col:"#555",borderRadius:3,transition:"width 0.4s"}}/></div>
          <div style={{flex:1,height:6,background:"#222",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(pb/max*100,100)}%`,background:pb>=pa?col:"#555",borderRadius:3,transition:"width 0.4s"}}/></div>
        </div>
        <span style={{fontSize:11,color:pb>pa?"#4ade80":pb<pa?"#f87171":"#aaa",fontFamily:"'JetBrains Mono',monospace",width:50}}>{vb||"—"}</span>
      </div>
    </div>);};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(8px)"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#151515,#0a0a0a)",border:"1px solid #222",borderRadius:16,padding:24,maxWidth:700,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:800,color:"#facc15",fontFamily:"'Chakra Petch',sans-serif"}}>⚖️ COMPARATEUR</div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {[1,2,3].map(n=><button key={n} onClick={()=>setTier(n)} style={{padding:"3px 10px",borderRadius:6,border:`1px solid ${tier===n?"#facc15":"#333"}`,background:tier===n?"#facc1522":"#111",color:tier===n?"#facc15":"#888",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Chakra Petch',sans-serif"}}>N{n}</button>)}
          <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,cursor:"pointer",marginLeft:8}}>✕</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>{renderSel(a,setA,searchA,setSA,"left")}{renderSel(b,setB,searchB,setSB,"right")}</div>
      {a&&b&&(()=>{const ta=gt(a,tier),tb=gt(b,tier);return(
        <div style={{background:"#111",borderRadius:10,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{textAlign:"center",flex:1}}><span style={{fontSize:20}}>{a.icon}</span><div style={{fontSize:12,fontWeight:700,color:"#f0f0f0",fontFamily:"'Chakra Petch',sans-serif"}}>{a.name}</div></div>
            <div style={{color:"#facc15",fontWeight:800,fontSize:14,alignSelf:"center"}}>VS</div>
            <div style={{textAlign:"center",flex:1}}><span style={{fontSize:20}}>{b.icon}</span><div style={{fontSize:12,fontWeight:700,color:"#f0f0f0",fontFamily:"'Chakra Petch',sans-serif"}}>{b.name}</div></div>
          </div>
          {bar("Soft",ta.soft,tb.soft,12,"#4ade80")}
          {bar("Hard",ta.hard,tb.hard,11,"#facc15")}
          {bar("AA Avion",ta.aa_fw,tb.aa_fw,12,"#f87171")}
          {bar("AA Hélico",ta.aa_rw,tb.aa_rw,10,"#c084fc")}
          {bar("PV",ta.hp,tb.hp,60,"#38bdf8")}
          {bar("Bâtiments",ta.buildings,tb.buildings,2.5,"#fb923c")}
          {ta.range!=null||tb.range!=null?bar("Portée",ta.range||0,tb.range||0,800,"#60a5fa"):null}
        </div>);})()}
    </div></div>);
}

    "Blindés":       {Infanterie:"+",Blindés:"=",Soutien:"-",Hélicoptères:"-",Chasseurs:"-","Aéronefs Lourds":"-",Naval:"×","Sous-Marins":"×"},
    "Soutien":       {Infanterie:"+",Blindés:"+",Soutien:"=",Hélicoptères:"AA",Chasseurs:"AA","Aéronefs Lourds":"AA",Naval:"~","Sous-Marins":"×"},
    "Hélicoptères":  {Infanterie:"+",Blindés:"+",Soutien:"-",Hélicoptères:"=",Chasseurs:"-","Aéronefs Lourds":"-",Naval:"+","Sous-Marins":"+"},
    "Chasseurs":     {Infanterie:"+",Blindés:"+",Soutien:"-",Hélicoptères:"+",Chasseurs:"=","Aéronefs Lourds":"+",Naval:"+","Sous-Marins":"×"},
    "Aéronefs Lourds":{Infanterie:"+",Blindés:"+",Soutien:"-",Hélicoptères:"-",Chasseurs:"-","Aéronefs Lourds":"=",Naval:"+","Sous-Marins":"×"},
    "Naval":         {Infanterie:"~",Blindés:"~",Soutien:"×",Hélicoptères:"-",Chasseurs:"-","Aéronefs Lourds":"-",Naval:"=","Sous-Marins":"-"},
    "Sous-Marins":   {Infanterie:"×",Blindés:"×",Soutien:"×",Hélicoptères:"-",Chasseurs:"×","Aéronefs Lourds":"×",Naval:"+","Sous-Marins":"="},
  };
  const cl={"+":"#4ade80","-":"#f87171","=":"#888","AA":"#c084fc","~":"#facc15","×":"#333"};
  const lb={"+":"Fort","-":"Faible","=":"Neutre","AA":"AA only","~":"Situationnel","×":"N/A"};
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(8px)"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#151515,#0a0a0a)",border:"1px solid #222",borderRadius:16,padding:24,maxWidth:800,width:"100%",maxHeight:"90vh",overflowY:"auto",overflowX:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:18,fontWeight:800,color:"#facc15",fontFamily:"'Chakra Petch',sans-serif"}}>🎯 TABLEAU MATCHUPS</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#888",fontSize:20,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{fontSize:10,color:"#666",marginBottom:12}}>Ligne = Attaquant → Colonne = Défenseur</div>
      <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse",width:"100%",minWidth:600}}>
        <thead><tr><th style={{padding:6,fontSize:9,color:"#555",borderBottom:"1px solid #222"}}></th>
          {cats.map(c=><th key={c} style={{padding:6,fontSize:8,color:"#aaa",fontWeight:600,borderBottom:"1px solid #222",textAlign:"center",writingMode:"vertical-lr",height:80}}>{c}</th>)}
        </tr></thead>
        <tbody>{cats.map(row=><tr key={row}>
          <td style={{padding:6,fontSize:9,color:"#ccc",fontWeight:600,borderBottom:"1px solid #1a1a1a",whiteSpace:"nowrap"}}>{row}</td>
          {cats.map(col=>{const v=m[row][col];return(
            <td key={col} style={{padding:4,textAlign:"center",borderBottom:"1px solid #1a1a1a"}}>
              <div style={{width:28,height:28,borderRadius:6,background:`${cl[v]}22`,border:`1px solid ${cl[v]}44`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",fontSize:10,fontWeight:800,color:cl[v]}}>{v}</div>
            </td>);})}
        </tr>)}</tbody>
      </table></div>
      <div style={{display:"flex",gap:12,marginTop:14,flexWrap:"wrap",justifyContent:"center"}}>
        {Object.entries(lb).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10}}>
          <div style={{width:16,height:16,borderRadius:4,background:`${cl[k]}33`,border:`1px solid ${cl[k]}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:cl[k]}}>{k}</div>
          <span style={{color:"#888"}}>{v}</span>
        </div>)}
      </div>
    </div></div>);
}
